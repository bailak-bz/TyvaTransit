[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["python -m pip install -r tyva-transit-backend/requirements.txt"]

[phases.build]
cmds = ["cd tyva-transit-backend && python manage.py collectstatic --noinput"]

[start]
cmd = "cd tyva-transit-backend && python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
