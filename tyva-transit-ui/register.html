<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Регистрация — ТываТранзит</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">🏔</span>
        <span class="logo-text">ТываТранзит</span>
      </a>
      <button type="button" class="nav-toggle" aria-label="Открыть меню" aria-expanded="false" aria-controls="site-nav">
        <span class="nav-toggle-icon" aria-hidden="true"></span>
      </button>
      <nav class="nav-main" id="site-nav">
        <a href="trips.html">Общие рейсы</a>
        <a href="private.html">Личная поездка</a>
        <a href="destinations.html">Направления</a>
        <a href="login.html" data-nav-auth>Войти</a>
        <a href="contacts.html">Контакты</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container container--narrow">
      <h1 class="page-title">Регистрация</h1>
      <p class="page-lead">Создайте аккаунт — билеты будут сохраняться в личном кабинете.</p>

      <div class="form-panel">
        <form id="register-form" action="#" novalidate>
          <div class="form-group">
            <label for="name">Имя</label>
            <input type="text" id="name" name="name" required autocomplete="name">
          </div>
          <div class="form-group">
            <label for="phone">Телефон</label>
            <input type="tel" id="phone" name="phone" placeholder="+7 …" required autocomplete="tel">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" minlength="8" required autocomplete="new-password">
            <p class="form-hint">Не менее 8 символов</p>
          </div>
          <div class="form-group">
            <label for="password2">Повторите пароль</label>
            <input type="password" id="password2" name="password2" minlength="8" required autocomplete="new-password">
          </div>
          <button type="button" id="register-btn" class="btn btn-primary btn-block">Зарегистрироваться</button>
        </form>
        <p class="form-footer-link">Уже есть аккаунт? <a href="login.html">Войти</a></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div><strong>ИП Ширин-оол Долаана Май-ооловна</strong> г. Кызыл</div>
    </div>
  </footer>
  <script src="js/nav.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth-nav.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
