<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Аккаунт — ТываТранзит</title>
  <link rel="stylesheet" href="css/styles.css?v=6">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">🏔</span>
        <span class="logo-text">ТываТранзит</span>
      </a>
      <button type="button" class="nav-toggle" aria-label="Открыть меню" aria-expanded="false" aria-controls="site-nav">
        <span class="nav-toggle-icon" aria-hidden="true"></span>
      </button>
      <nav class="nav-main" id="site-nav">
        <a href="private.html">Личная поездка</a>
        <a href="trips.html">Общие рейсы</a>
        <a href="destinations.html">Направления</a>
        <a href="login.html" class="active" data-nav-auth>Войти</a>
        <a href="contacts.html">Контакты</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <div data-guest-panel hidden>
        <h1 class="page-title">Личный кабинет</h1>
        <p class="page-lead">Войдите, чтобы видеть активные билеты и историю поездок.</p>
        <a href="login.html" class="btn btn-primary">Войти</a>
      </div>

      <div data-account-panel hidden>
        <div class="account-header">
          <div>
            <h1 class="page-title" data-user-name>Аккаунт</h1>
            <p class="page-lead">Активные билеты, история поездок и профиль</p>
          </div>
          <button type="button" class="btn btn-secondary btn-sm" data-logout>Выйти</button>
        </div>
      </div>

      <div class="page-tabs account-tabs">
        <button type="button" class="active" data-account-tab="active">Активные билеты</button>
        <button type="button" data-account-tab="history">История</button>
        <button type="button" data-account-tab="profile">Профиль</button>
      </div>

      <section data-account-panel-id="active">
        <div class="booking-list" data-active-bookings>
          <p class="card-meta">Загрузка…</p>
        </div>
      </section>

      <section data-account-panel-id="history" hidden>
        <div class="booking-list" data-history-bookings>
          <p class="card-meta">Загрузка…</p>
        </div>
      </section>

      <section data-account-panel-id="profile" hidden>
        <div class="form-panel">
          <form id="profile-form" action="#" method="post">
            <div class="form-group">
              <label for="profile-name">Имя</label>
              <input type="text" id="profile-name" name="name" required>
            </div>
            <div class="form-group">
              <label for="profile-phone">Телефон</label>
              <input type="tel" id="profile-phone" name="phone" required>
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
          </form>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div><strong>ИП Ширин-оол Долаана Май-ооловна</strong> г. Кызыл</div>
    </div>
  </footer>

  <div class="modal-overlay" id="payment-modal" hidden>
    <div class="modal" role="dialog" aria-labelledby="payment-modal-title" aria-modal="true">
      <button type="button" class="modal-close" data-modal-close aria-label="Закрыть">×</button>
      <h2 class="modal-title" id="payment-modal-title">Оплата брони</h2>
      <p class="card-meta" data-modal-route></p>
      <p class="modal-amount" data-modal-amount></p>

      <fieldset class="form-group payment-methods">
        <legend>Способ оплаты</legend>
        <label class="vehicle-option">
          <input type="radio" name="modal-pay" value="sbp" checked>
          <div>
            <strong>СБП</strong>
            <p class="form-hint" style="margin: 0;">Оплата по QR в приложении банка</p>
          </div>
        </label>
        <label class="vehicle-option">
          <input type="radio" name="modal-pay" value="card">
          <div>
            <strong>Банковская карта</strong>
            <p class="form-hint" style="margin: 0;">Visa, Mastercard, «Мир»</p>
          </div>
        </label>
      </fieldset>

      <button type="button" class="btn btn-primary btn-block" data-modal-pay>Оплатить</button>
    </div>
  </div>

  <script src="js/nav.js?v=6"></script>
  <script src="js/api.js?v=6"></script>
  <script src="js/auth-nav.js?v=6"></script>
  <script src="js/account.js?v=6"></script>
</body>
</html>
