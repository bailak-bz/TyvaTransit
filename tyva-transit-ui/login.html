<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Вход — ТываТранзит</title>
  <link rel="stylesheet" href="css/styles.css?v=5">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">🏔</span>
        <span class="logo-text">ТываТранзит</span>
      </a>
      <button type="button" class="nav-toggle" aria-label="Открыть меню" aria-expanded="false" aria-controls="site-nav">
        <span class="nav-toggle-icon" aria-hidden="true"></span>
      </button>
      <nav class="nav-main" id="site-nav">
        <a href="trips.html">Общие рейсы</a>
        <a href="private.html">Личная поездка</a>
        <a href="destinations.html">Направления</a>
        <a href="login.html" class="active" data-nav-auth>Войти</a>
        <a href="contacts.html">Контакты</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container container--narrow">
      <h1 class="page-title">Вход в аккаунт</h1>
      <p class="page-lead">Войдите, чтобы видеть активные билеты и историю поездок.</p>

      <div class="form-panel">
        <form id="login-form" action="#" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
          </div>
          <button type="button" id="login-btn" class="btn btn-primary btn-block">Войти</button>
        </form>
        <p class="form-footer-link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
        <p class="form-footer-link"><a href="account.html#lookup">Найти билет по номеру без входа</a></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div><strong>ИП Ширин-оол Долаана Май-ооловна</strong> г. Кызыл</div>
    </div>
  </footer>
  <script src="js/nav.js?v=5"></script>
  <script src="js/api.js?v=5"></script>
  <script src="js/auth-nav.js?v=5"></script>
  <script src="js/login.js?v=5"></script>
</body>
</html>
